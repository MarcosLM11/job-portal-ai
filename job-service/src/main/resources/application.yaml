server:
  port: 8083

spring:
  application:
    name: job-service
    description: Job Service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/job-portal-db
    username: postgres
    password: postgresPassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_batch_fetch_size: 20
    show-sql: false
    open-in-view: false
  cloud:
    openfeign:
      client:
        config:
          company-service:
            connect-timeout: 2000
            read-timeout: 2000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

company-service:
  base-url: http://localhost:8082

logging:
  structured:
    format:
      file: logstash
  file:
    name: logs/job-service.log